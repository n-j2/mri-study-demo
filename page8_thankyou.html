<!DOCTYPE html>
<html>
<head>
  <script src="demo-config.js"></script>
  <title>Thank You</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .centered-page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .thankyou-container {
      text-align: center;
      max-width: 700px;
      padding: 50px 40px;
    }

    .thankyou-container h1 {
      font-size: 36px;
      margin-bottom: 25px;
    }

    .thankyou-container p {
      font-size: 20px;
      margin: 16px 0;
      line-height: 1.5;
    }

    .participant-id-box {
      margin-top: 25px;
      padding: 16px;
      background: #f0f4f8;
      border-radius: 8px;
      font-size: 18px;
    }

    .participant-id-value {
      font-weight: bold;
      font-size: 22px;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<div class="centered-page">
  <div class="container thankyou-container">
    <h1>Thank you for participating</h1>

    <div class="participant-id-box">
      <p>Your participant ID is:</p>
      <p id="participantIdDisplay" class="participant-id-value">----</p>
      <p style="font-size:16px; margin-top:10px;">
        Please make a note of this and keep it in a secure place. We will need this if you later contact us about your data.
      </p>
    </div>

    <p>Please return this laptop to the researcher.</p>
  </div>
</div>

<script>
  const participantId = localStorage.getItem("participant_id");

  if (participantId) {
    document.getElementById("participantIdDisplay").innerText = participantId;
  } else {
    document.getElementById("participantIdDisplay").innerText = "Not found";
  }
</script>

</body>
</html>
